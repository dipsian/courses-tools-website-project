  <div class="container">
    <h1>YouTube Thumbnail Downloader</h1>
    <div class="input-section">
      <input type="text" id="urlInput" placeholder="Paste YouTube video link here...">
      <button onclick="handleDownload()">Download</button>
    </div>
    <div class="thumbnails" id="thumbnails">

<script src="/assests/bootstrap/js/bootstrap.bundle.min.js"></script>

<script>
  function isValidYouTubeUrl(url) {
    const pattern = /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/(watch\?v=|embed\/|v\/|shorts\/)?([a-zA-Z0-9_-]{11})/;
    return pattern.test(url);
  }

  function getVideoId(url) {
    const match = url.match(/(?:v=|shorts\/|vi\/|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return match ? match[1] : null;
  }

  async function handleDownload() {
    const url = document.getElementById('urlInput').value.trim();
    const errorPopup = document.getElementById('errorPopup');
    const thumbnails = document.getElementById('thumbnails');

    if (!isValidYouTubeUrl(url)) {
      errorPopup.style.display = 'block';
      thumbnails.style.display = 'none';
      setTimeout(() => errorPopup.style.display = 'none', 3000);
      return;
    }

    const videoId = getVideoId(url);
    if (!videoId) return;

    const baseUrl = 'https://img.youtube.com/vi/';
    const largeUrl = `${baseUrl}${videoId}/maxresdefault.jpg`;
    const smallUrl = `${baseUrl}${videoId}/hqdefault.jpg`;

    // Check if maxresdefault exists
    const img = new Image();
    img.src = largeUrl;
    await new Promise(resolve => img.onload = resolve);
    const finalLargeUrl = img.naturalWidth === 120 ? `${baseUrl}${videoId}/hqdefault.jpg` : largeUrl;

    displayThumbnails(finalLargeUrl, smallUrl);
  }

  async function displayThumbnails(largeUrl, smallUrl) {
    const thumbnails = document.getElementById('thumbnails');
    thumbnails.style.display = 'flex';

    const createThumbnailSection = async (url, containerId) => {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      const img = new Image();
      img.src = url;
      await new Promise(resolve => img.onload = resolve);

      const sizeText = document.createElement('div');
      sizeText.className = 'size-text';
      sizeText.textContent = `${img.naturalWidth} x ${img.naturalHeight} px`;

      const downloadBtn = document.createElement('button');
      downloadBtn.textContent = 'Download';
      downloadBtn.onclick = () => downloadImage(url, `thumbnail-${containerId}-${Date.now()}.jpg`);

      container.appendChild(img);
      container.appendChild(sizeText);
      container.appendChild(downloadBtn);
      img.className = 'thumbnail-img';
    };

    await createThumbnailSection(largeUrl, 'largeThumbnail');
    await createThumbnailSection(smallUrl, 'smallThumbnail');
  }

  async function downloadImage(url, filename) {
    try {
      const response = await fetch(url);
      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = objectUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(objectUrl);
    } catch (error) {
      console.error('Download failed:', error);
    }
  }

</script>
